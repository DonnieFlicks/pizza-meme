<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="pizza" content="pizza, meme, toppings">
        <title>What toppings should we get?</title>
        <link rel="stylesheet" href="style.css"/> 
    </head>
    <body>
        <div class="container">
            <!--container will have 2 seperate divs "pizzaIMG and the interactions section of the meme"-->
            <div class="pizzaIMG">
                <img src="pizza.jpg" width="300">
            </div>
            <div class="interactions">
                <!--container will have the question div and the toppings div-->
                <div class="question">
                    <h2>Pick 3 toppings</h2>
                </div>
                <div class="toppings-container">
                    <!--Here we are separating 6 toppings into 2 separate divs, for sake of clarity-->
                    <div class="left-side">
                        <!--Add peperroni, sausage, chicken buttons-->
                        <button name="pepperoni">Pepperoni</button>
                        <button name="chicken">Chicken</button>
                        <button name="sausage">Sausage</button>
                    </div>
                    <div class="right-side">
                        <!--Add green peppers, broccoli, pineapple buttons-->
                        <button name="green peppers">Green Peppers</button>
                        <button name="broccoli">Broccoli</button>
                        <button name="pineapple">Pineapple</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
