<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="pizza" content="pizza, meme, toppings">
        <title>What toppings should we get?</title>
        <link rel="meme appearance" href="style.css"/> 
    </head>
    <body>
        <meme>
            <img src="pizza.jpg"
            alt="pizza"
            width="500px">
        </meme>
        <panel>
            <question>
                <h1>You read the meme... Select 3 toppings.</h1>
                <choices1>
                    <button name="pepperoni">
                        <h3>pepperoni</h3>
                    </button>
                    <button name="sausage">
                        <h3>sausage</h3>
                    </button>
                    <button name="chicken">
                        <h3>chicken</h3>
                    </button> 
                </choices1>
                <choices2>
                    <button name="green peppers">
                        <h3>green peppers</h3>
                    </button>
                    <button name="broccoli">
                        <h3>broccoli</h3>
                    </button>
                    <button name="pineapple">
                        <h3>pineapple</h3>
                    </button>
                </choices2>
            </question>
        </panel>
    </body>
    <footer>
        <p>created by Adonis</p>
    </footer>
</html>
