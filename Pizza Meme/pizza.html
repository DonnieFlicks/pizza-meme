<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="pizza" content="pizza, meme, toppings">
        <title>What toppings should we get?</title>
        <link rel="meme appearance" href="style.css"/> 
        <style>
            .container {
                border: 1px solid black;
                width: 80%;
                margin: auto;
                padding: 20px;
                background-color: rgb(109, 153, 109);
                border-radius: 5px;
                box-shadow: 2px 2px 10px;
                display: flex
            }

            .pizzaIMG {
                border: 2px solid black;
                width: 45%;
                margin-right: auto;
                padding: 20px;
                background-color: rgb(28, 28, 236);
                border-radius: 20px;
                box-shadow: 2px 2px 10px;
            }
            
            .interactions{
                border: 2px solid black;
                width: 35%;
                height: fit-content;
                margin: auto;
                padding: 20px;
                border-radius: 20px;
                background-color:  rgb(28, 28, 236);
            }

            .question {
                border: 1px solid black;
                background-color:blanchedalmond;
                margin: auto;
                padding: 10px;
                text-align: center;
                height: 60px;
            }

            .toppings-container{
                display: flex;
            }

            .left-side {
                
                width: 25%;
                margin-right: auto;
                padding: 20px;
            }

            .right-side {
                width: 25%;
                margin-right: auto;
                padding: 20px;
            }

        </style>
    </head>
    <body>
        <div class="container">
            <!--container will have 2 seperate divs "pizzaIMG and the interactions section of the meme"-->
            <div class="pizzaIMG">
                <img src="pizza.jpg" width="300">
            </div>
            <div class="interactions">
                <!--container will have the question div and the toppings div-->
                <div class="question">
                    <h2>Pick 3 toppings</h2>
                </div>
                <div class="toppings-container">
                    <!--Here we are separating 6 toppings into 2 separate divs, for sake of clarity-->
                    <div class="left-side">
                        <!--Add peperroni, sausage, chicken buttons-->
                        <button name="pepperoni">Pepperoni</button>
                        <button name="chicken">Chicken</button>
                        <button name="sausage">Sausage</button>
                    </div>
                    <div class="right-side">
                        <!--Add green peppers, broccoli, pineapple buttons-->
                        <button name="green peppers">Green Peppers</button>
                        <button name="broccoli">Broccoli</button>
                        <button name="pineapple">Pineapple</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
