<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale">
        <title>Layout and Positioning</title>
        <style>
            
            .block {
                background-color: lightblue;
                padding: 10px;
            }

            .inline {
                background-color: lightgreen; 
                padding: 5px;
            }

            .hidden {
                display: none;
            }


        </style>
    </head>
    <body>
        <div class="block">I am a block element</div>
        <span class="inline">I am inline</span>
        <span class="hidden">You cannot see me :p</span>
        <span class="inline">I am inline as well</span>
    </body>
</html>
